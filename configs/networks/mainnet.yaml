# Recommended start_height for fresh deployments.
#
# Background: per ADR-021 (Shannon history discontinuity), poktroll mainnet
# cannot be re-synced from genesis with any released binary — a wall-clock-
# dependent code path (fixed in v0.1.17 via poktroll PR #1436) produced
# non-deterministic results around block 96610. PNF distributes snapshots
# past the bad window rather than enabling raw genesis sync.
#
# For analytics/quick-catch-up deployments: leave `start_height` set to a
# height past the discontinuity (>= 102142, i.e. v0.1.17 applied). For full
# archive: bootstrap from a snapshot-seeded archive node and let PocketScribe
# read its FilePlugin output from there. Do NOT point `ps fileplugin` at a
# self-syncing-from-genesis node — it will halt.
#
# recommended_start_height: 102142   # first block under deterministic binary
#
# Optional: partial-history indexing. If unset, indexes from genesis (height 1)
# subject to the constraints above. If set, PocketScribe bootstraps entity
# state by querying the chain at this height (via gRPC bulk list) and ignores
# all blocks before this point.
#
# start_height: 700000

endpoints:
  rpc:
    - https://sauron-rpc.infra.pocket.network
  lcd:
    - https://sauron-api.infra.pocket.network
  grpc: []                          # Sauron does not publicly expose gRPC; use LCD for state queries

# Legacy endpoints (previous team's infra, NOT maintained by PNF — kept here
# for documentation only; do not use in production):
#   - https://shannon-grove-rpc.mainnet.poktroll.com
#   - https://shannon-grove-api.mainnet.poktroll.com
#   - shannon-grove-grpc.mainnet.poktroll.com:443
