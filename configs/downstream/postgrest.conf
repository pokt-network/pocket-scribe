# PostgREST configuration for PocketScribe dev / spike.
# Production deployments tune these per security / auth requirements.

# Database connection (env-injected at runtime via PGRST_DB_URI)
db-uri = "$(PGRST_DB_URI)"

# Schemas to expose. PocketScribe uses the default `public` schema.
db-schemas = "public"

# Anonymous role for unauthenticated access (spike: read-only).
# In production: create dedicated `web_anon` role with limited GRANTs.
db-anon-role = "pocketscribe_anon"

# Authenticated role would be set via JWT; spike uses anon only.
# jwt-secret = "..."
# jwt-aud = "pocketscribe"

# Limit max rows per query to prevent accidental DoS.
db-max-rows = 1000

# OpenAPI generation — GET / returns the OpenAPI 3.0 spec.
openapi-mode = "follow-privileges"
openapi-server-proxy-uri = "http://localhost:3000"

# Connection pool
db-pool = 10
db-pool-acquisition-timeout = 10

# Pre-request function (left empty; spike).
# db-pre-request = "public.pre_request_hook"

# Server config
server-host = "*4"
server-port = 3000

# Tighter timeouts for dev
db-extra-search-path = "public"
db-channel-enabled = false   # we don't use LISTEN/NOTIFY (use NATS bridge)
