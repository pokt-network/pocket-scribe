version: v2

plugins:
  - remote: buf.build/protocolbuffers/go
    out: internal/proto/gen
    opt:
      - paths=source_relative

  # Per-poktroll-version codegen. Outputs land in `internal/decoders/v{X}_{Y}_{Z}/gen/`.
  # Note: For per-version generation, prefer one buf.gen.<version>.yaml file per
  # version OR invoke `buf generate --template buf.gen.poktroll.yaml --path third_party/proto/poktroll/v{X}_{Y}_{Z}`.
  # The skill `add-decoder-version` (TODO) automates this.
