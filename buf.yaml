version: v2

modules:
  # Our own protos (NATS envelope, internal RPC contracts)
  - path: internal/proto
    name: github.com/pokt-network/pocketscribe/internal/proto

  # Vendored poktroll protos, one per supported chain version.
  # Add a new module when onboarding a new version (see ADR-008 / .claude/agents/pocketscribe-proto-versioner.md).
  - path: third_party/proto/poktroll/v0_0_10
  - path: third_party/proto/poktroll/v0_0_12
  - path: third_party/proto/poktroll/v0_1_0
  - path: third_party/proto/poktroll/v0_1_5

  # Cosmos SDK protos (needed for shared types like Coin, BlockID, etc.)
  - path: third_party/proto/cosmos-sdk/v0.53

lint:
  use:
    - STANDARD

breaking:
  use:
    - WIRE
