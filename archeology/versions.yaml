# Chain-authoritative upgrade table for poktroll Shannon MAINNET.
#
# Source: Sauron LCD /cosmos/upgrade/v1beta1/applied_plan/{name}
# Verified 2026-05-22. Refresh via `scripts/sauron-upgrades.sh`.
#
# Read by the orchestrator (scripts/run-chapter.sh) to know, for each binary
# version, what height to sync UP TO before stopping and swapping to the
# next binary.
#
# Format:
#   network: mainnet | beta
#   versions:
#     - tag: vX.Y.Z              # poktroll release tag (must exist in GitHub releases)
#       applied_height: <int>    # height at which this upgrade was APPLIED on chain
#                                # (i.e. the first height this binary executed)
#       runs_until: <int>        # last height this binary should execute
#                                # (= next version's applied_height - 1)
#                                # For the latest version, this is "tip" (set dynamically)
#       notes: <string>
#       shim_required: bool      # if true, we cannot run the stock binary —
#                                # need experiments/.../shim/ patched build.
#       upload_chapter: <int>    # logical "chapter" for batching uploads to S3.
#                                # Chapters group consecutive versions whose total
#                                # output is roughly equal-sized.

network: mainnet
chain_id: pocket
genesis_sha256: b4adc3614def79b63e777f90cf0a62cf43ea6a17715bdcd16c982ae8e44abee2
genesis_url: https://raw.githubusercontent.com/pokt-network/pocket-network-genesis/master/shannon/mainnet/genesis.json

# Persistent peer (Sauron PNF seed-two). Non-default P2P port 26663.
persistent_peers:
  - e3f1a09e045433199c94172ef0d6fc9ab7212ad7@seed-two.p2p.infra.pocket.network:26663

versions:
