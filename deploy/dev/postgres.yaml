# Postgres + TimescaleDB for local dev.
# Reachable on localhost:5432 via kind NodePort mapping (configs/dev/kind-cluster.yaml).
# Ephemeral: data is lost on pod restart. Migrations re-apply via Tilt local_resource.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_USER: pocketscribe
  POSTGRES_PASSWORD: dev_only_password
  POSTGRES_DB: pocketscribe
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  labels:
    app: postgres
data:
  001-timescaledb.sql: |
    CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: timescale/timescaledb:latest-pg18
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: init
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - pocketscribe
                - -d
                - pocketscribe
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - pocketscribe
                - -d
                - pocketscribe
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: init
          configMap:
            name: postgres-init
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30000
      name: postgres
